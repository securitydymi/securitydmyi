<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMYI Security | Segurança Privada em Campinas e Região</title>
    <link class="flex" rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes pulse-subtle {
            0%, 100% { transform: scale(1); box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4); }
            50% { transform: scale(1.03); box-shadow: 0 20px 30px -5px rgba(16, 185, 129, 0.6); }
        }
        .btn-premium { animation: pulse-subtle 3s infinite ease-in-out; }

        /* Animação suave para os links do menu baseado na nova paleta azul */
        .nav-link {
            position: relative;
            transition: color 0.3s ease;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            width: 100%;
            transform: scaleX(0);
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: #3b82f6; /* Cor Blue-500 em sintonia com a logo */
            transform-origin: bottom right;
            transition: transform 0.25s ease-out;
        }
        .nav-link:hover::after, .nav-link:focus::after {
            transform: scaleX(1);
            transform-origin: bottom left;
        }

        /* Estilos universais de expansão (para Serviços e Diferenciais) */
        .card-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out, opacity 0.3s ease-out;
            opacity: 0;
        }
        .card-expanded .card-content {
            max-height: 250px;
            opacity: 1;
            margin-top: 1rem;
        }
        .card-expanded .arrow-icon {
            transform: rotate(180deg);
        }

        /* Remove a barra de rolagem visual do carrossel mantendo a funcionalidade */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
